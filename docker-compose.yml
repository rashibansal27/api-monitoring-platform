version: "3.9"

services:
  # ── TimescaleDB ─────────────────────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: apm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: api_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: apm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apm_app
    restart: unless-stopped
    env_file: .env
    environment:
      # Override .env values to use Docker service hostnames
      DB_HOST: db
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app           # live-reload mount for development
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  timescale_data:
  redis_data:
